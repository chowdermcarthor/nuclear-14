[admin]
deadmin_on_join = true
see_own_notes = true
server_ban_erase_player = true
new_player_threshold = 600
alert.explosion_min_intensity = -1

[adminlogs]
server_name = "misfits: nuclear wasteland"

[auth]
mode = 1

[events]
enabled = false

[explosion]
can_create_vacuum = false

[atmos]
space_wind = false
monstermos_depressurization = false
monstermos_rip_tiles = false
# #Misfits Add — disable gas equalization. With space_wind, depressurization,
# and rip_tiles already off, equalization is the only remaining heavy atmos
# subsystem. On an 8000×4190 map it can saturate its 3ms budget every other
# tick just spreading gas through opened doors. Disabling it means gases
# still mix inside a tile but stop actively flowing between tiles.
monstermos_equalization = false
# #Misfits Add — reduce atmos sub-tick rate from 15 Hz to 8 Hz.
# Atmos consumes up to max_process_time ms each sub-tick. At 15 Hz that's
# every ~2.6 game ticks (at 25 TPS). At 8 Hz it's every ~3.1 ticks,
# freeing ~1ms/tick for physics and game logic on average.
tickrate = 8
# #Misfits Add — tighten atmos time cap from 3ms to 2ms.
# Pathfinding already claims 3ms. Combined budget was 6ms/40ms = 15%.
# Reducing atmos to 2ms brings combined to 5ms/40ms = 12.5%.
max_process_time = 2

[game]
desc = "TBD"
hostname = "Misfits: Nuclear Wasteland"
defaultpreset = "N14"
fallbackenabled = false
fallbackpreset = "N14"
round_end_sound_collection = "CMRoundEnd"
contraband_examine = false
maxplayers = 150
soft_max_players = 100
panic_bunker.enabled = false
round_end_pvs_overrides = false
round_restart_time = 180
lobbyduration = 180

[gateway]
generator_enabled = false

[ghost]
kill_crit = false
role_time = 0

[guidebook]
show_editor_species_button = false

[hub]
# Set to true to show this server on the public server list
# Before enabling this, read: https://docs.spacestation14.io/hosts/hub-rules
advertise = false

# Comma-separated list of tags, useful for categorizing your server.
# See https://docs.spacestation14.io/hosts/hub-rules for more details on this when it becomes relevant.
tags = "lang:en,region:am_n_c,rp:med"

[ic]
flavor_text = true
id_job_length = 50

[infolinks]
#appeal = "https://appeal.rouny-ss14.com"
#bug_report = "https://github.com/RMC-14/RMC-14/issues/new?assignees=&labels=&projects=&template=issue_report.md&title="
discord = "https://discord.com/invite/8a6y8esphP"
#forum = "https://forum.rouny-ss14.com"
github = "https://github.com/Misfit-Sanctuary/nuclear-14"
#patreon = "https://www.patreon.com/15572862/join" # Misfits Change - blanked, Valve TOS conflict on Steam builds
#website = ""
wiki = "https://ss14.misfitsystems.net/wiki/index.php/Main_Page"

[net]
tickrate = 25
bindto = "::,0.0.0.0"
log_late_msg = false
# #Misfits Fix - increase send/receive buffers to 1 MB to avoid
# "send buffer full" errors during long rounds with 20+ players.
sendbuffersize = 1048576
receivebuffersize = 1048576
# #Misfits Add — network tuning to reduce rubberbanding.
# buffer_size = 3 gives clients 1 extra tick of jitter absorption (~40ms at 25 TPS).
# mtu/mtu_expand reduce UDP fragmentation → fewer dropped game states.
buffer_size = 3
mtu = 1200
mtu_expand = true
# #Misfits Add — PVS tuning for large maps.
# pvs_budget: max NEW entities sent to a client per tick (default 50).
# pvs_enter_budget: max entities re-entering view per tick (default 200).
# Lower values reduce per-tick serialization cost at the expense of slightly
# slower entity pop-in when moving fast. On Wendover (8k tiles) pop-in is
# rarely noticed because most movement is on foot.
pvs_budget = 30
pvs_enter_budget = 100

[sys]
# #Misfits Add — more precise tick timing on Windows servers (default = 3).
win_tick_period = 1

[physics]
grid_splitting = false
maxlinvelocity = 72
target_minimum_tickrate = 60

[npc]
# Maximum NPC AI updates processed per HTN tick (~7 Hz).
# Lower = less CPU per tick, but distant sleeping NPCs are already culled by
# ProximityNPCSystem so only awake NPCs consume budget.
# 512 is intentional — at peak (~50 awake NPCs) this is more than enough.
# Do NOT raise to 4096; that blows the 40ms tick budget with pathfinding.
max_updates = 512
# Pathfinding CPU budget per server tick (ms). Default is 3.
# Keep this conservative — at 25 TPS (40ms budget), 3ms = 7.5% of budget.
# Raising to 5 uses 12.5% and leaves less room for physics + game logic.
pathfinding_time_ms = 3
# Override all NPC juke cooldowns (seconds). -1 = disabled (use per-NPC YAML defaults).
# Setting this to e.g. 10 makes ALL NPCs dodge only every 10s — saves CPU but
# makes combat feel sluggish. Leave disabled and tune per-prototype instead.
# juke_cooldown_override = -1

[pointing]
cooldown_seconds = 1

[procgen]
preload = false

[replay]
auto_record = true
max_compressed_size = 4194304
max_uncompressed_size = 8388608
auto_record_temp_dir = "recording"
auto_record_name = "done/{year}_{month}_{day}-{hour}_{minute}-round_{round}.zip"

# #Misfits Change: Auto-call the emergency shuttle after 60 minutes.
# The vote-to-extend resets this timer. auto_call_extension_time resets after a recall.
[shuttle]
auto_call_time = 240
auto_call_extension_time = 60

[status]
# The status server is the TCP side, used by the launcher to determine engine version, etc.
# To be clear: Disabling it makes the launcher unable to connect!
enabled = true
