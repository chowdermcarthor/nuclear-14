- type: job
  id: Raider
  setPreference: true
  name: job-name-raider #Misfits Change
  description: job-description-raider
  playTimeTracker: Raider
  whitelisted: true # #Misfits Change - Use per-job whitelist so admins must manually approve players via JobWhitelistManager; CharacterWhitelistRequirement only checks the server connection whitelist (disabled by default) and would let everyone through
  requirements:
  - !type:MinPlayersRequirement
    min: 0
  startingGear: RaiderGear
  alwaysUseSpawner: true
  icon: "JobIconRaider"
  supervisors: job-supervisors-raider
  canBeAntag: false
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - PlayerRaider #Misfits Change - Use PlayerRaider so NPC Raiders are hostile to job Raiders

