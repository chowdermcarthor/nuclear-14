    sprite: _RMC/Objects/Medical/medical.rsi
  - type: Item
    size: Small
    sprite: _RMC/Objects/Medical/medical.rsi
    heldPrefix: ointment
  # Inherited
  - type: StaticPrice
    price: 0
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage

- type: entity
  parent: CMBaseHealingItem
