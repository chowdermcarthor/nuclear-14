# It shouldn't pick up objects or anything similar, merely charge and hit you with whatever he got.
- type: htnCompound
  id: N14MeleeCombatCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: NearbyMeleeTargets
        - !type:HTNCompoundTask
          task: N14MeleeAttackTargetCompound

- type: htnCompound
  id: N14MeleeAttackTargetCompound
  branches:
    - preconditions:
      - !type:KeyExistsPrecondition
        key: Target
      tasks:
        - !type:HTNPrimitiveTask
          operator: !type:MoveToOperator
            shutdownState: PlanFinished
            pathfindInPlanning: false
            removeKeyOnFinish: false
            targetKey: TargetCoordinates
            pathfindKey: TargetPathfind
            rangeKey: MeleeRange

        # #Misfits Change — Re-enabled: the juke system was refactored to handle edge cases
        # (null target, missing weapon) that caused the original errors. The continuous melee
        # back-off in NPCJukeSystem.cs prevents NPCs from sticking to the target entity.
        - !type:HTNPrimitiveTask
          operator: !type:JukeOperator
            jukeType: Away

        - !type:HTNPrimitiveTask
          operator: !type:MeleeOperator
            targetKey: Target
          preconditions:
            - !type:KeyExistsPrecondition
              key: Target
            - !type:TargetInRangePrecondition
              targetKey: Target
              rangeKey: MeleeRange
          services:
            - !type:UtilityService
              id: MeleeService
              proto: NearbyMeleeTargets
              key: Target