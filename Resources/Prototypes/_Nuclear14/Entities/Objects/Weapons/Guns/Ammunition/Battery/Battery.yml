- type: entity
  name: microfusion cell
  description: A microfusion cell, typically used as ammunition for large energy weapons.
  id: N14BasePowerCell
  abstract: true
  parent: BaseItem
  components:
  - type: Battery
    pricePerJoule: 0.015
  - type: Explosive
    #Misfits Change - use the structural-capable N14 explosion profile.
    explosionType: N14DefaultStructural
    maxIntensity: 200
    intensitySlope: 1.5
  - type: Tag
    tags:
      - N14MicrofusionCell
      - N14AmmoCell
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/microfusion.rsi
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
        - ReagentId: Zinc
          Quantity: 5
  - type: Appearance
  - type: PowerCellVisuals
  - type: Riggable
  # - type: Craftable  # #Misfits Remove: Stalker14 crafting system
  - type: HitscanBatteryAmmoProvider
    proto: N14MFLaserRed
    fireCost: 50

#MARK: Microfusion Cells — Red < Green < Blue < Violet
# All 4 tiers share the N14MicrofusionCell tag so ANY laser weapon can accept ANY tier.
# Damage is determined by the cell's hitscan proto; the gun only controls fire rate and accuracy.

- type: entity
  name: microfusion cell (red)
  description: A standard microfusion cell. Fires a red laser beam — the most common and cheapest energy ammo on the wasteland.
  id: N14MicrofusionCellRed
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/microfusion.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: HitscanBatteryAmmoProvider
    proto: N14MFLaserRed
    fireCost: 50

- type: entity
  name: microfusion cell (green)
  description: A tuned microfusion cell calibrated to emit a green-wavelength beam. Slightly more powerful than the standard red variant.
  id: N14MicrofusionCellGreen
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/microfusion.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: HitscanBatteryAmmoProvider
    proto: N14MFLaserGreen
    fireCost: 50

