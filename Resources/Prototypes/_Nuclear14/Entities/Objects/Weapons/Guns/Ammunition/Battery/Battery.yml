#MARK: Plasma cartridge

- type: entity
  name: base plasma cell
  description: A small green glowing cartridge, commonly used as ammo for any kind of plasma weapon.
  id: N14BasePlasmaCell
  abstract: true
  parent: BaseItem
  components:
  - type: Battery
    pricePerJoule: 0.015
  - type: Explosive
    #Misfits Change - use the structural-capable N14 explosion profile.
    explosionType: N14DefaultStructural
    maxIntensity: 200
    intensitySlope: 1.5
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/plasma.rsi
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
        - ReagentId: Zinc
          Quantity: 5
  - type: Appearance
  - type: PowerCellVisuals
  - type: Riggable
  - type: ProjectileBatteryAmmoProvider
    proto: BulletPlasma
    fireCost: 100

- type: entity
  name: plasma cartridge
  description: A small green glowing cartridge, commonly used as ammo for any kind of plasma weapon.
  id: N14PlasmaCartridge
  suffix: Full
  parent: N14BasePlasmaCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/plasma.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
  - type: Tag
    tags:
      - N14PlasmaCartridge
      - N14AmmoCell
  - type: Battery
    maxCharge: 1800
    startingCharge: 1800

