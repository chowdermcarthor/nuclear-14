- type: entity
  name: microfusion cell (violet)
  description: An experimental microfusion cell emitting a violet ultraviolet-spectrum beam. The most powerful energy cell available — extremely rare pre-war technology.
  id: N14MicrofusionCellViolet
  suffix: Full
