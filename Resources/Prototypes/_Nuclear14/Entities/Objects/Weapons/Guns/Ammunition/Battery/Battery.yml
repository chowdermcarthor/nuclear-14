#MARK: Electron Charge Packs — Red < Green < Blue < Violet
# All 4 tiers share the N14ElectronChargePack tag so ANY pulse weapon can accept ANY tier.
# Pulse weapons deal Heat + Shock damage (effective against mechanical targets).

- type: entity
  name: electron charge pack (red)
  description: A standard electron charge pack tuned for electromagnetic pulse discharge. The most common pulse weapon ammunition.
  id: N14ElectronChargePackRed
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/ECP.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
        scale: 0.5, 0.5
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        scale: 0.5, 0.5
        shader: unshaded
  - type: Tag
    tags:
      - N14ElectronChargePack
      - N14AmmoCell
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: HitscanBatteryAmmoProvider
    proto: N14PulseRed
    fireCost: 50

