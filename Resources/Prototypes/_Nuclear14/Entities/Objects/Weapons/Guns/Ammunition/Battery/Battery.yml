#MARK: High-Capacity Microfusion Cells — Red < Green < Blue < Violet
# Same N14MicrofusionCell tag as standard cells, so they fit ANY laser weapon.
# 5000 charge / 50 fireCost = 100 shots (vs 24 from standard cells).
# Intended for heavy weapons like the Laser Gatling that need sustained fire.

- type: entity
  name: high-capacity microfusion cell (red)
  description: An oversized microfusion cell packed with additional fusion fuel. Holds far more charge than a standard cell — designed for heavy laser weapons that chew through ammo.
  id: N14MicrofusionCellHighCapRed
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/fusion.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
  - type: Item
    size: Normal
  - type: Battery
    maxCharge: 5000
    startingCharge: 5000
  - type: HitscanBatteryAmmoProvider
    proto: N14MFLaserRed
    fireCost: 50

