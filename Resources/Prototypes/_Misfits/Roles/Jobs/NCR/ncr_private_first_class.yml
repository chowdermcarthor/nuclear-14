- type: job
  id: NCRPrivateFirstClass
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 30
  overrideConsoleVisibility: false
  canBeAntag: false
  name: job-name-ncr-private-first-class
  description: job-description-ncr-private-first-class
  playTimeTracker: NCRPrivateFirstClass
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
      - Ghoul
    - !type:CharacterPlaytimeRequirement
      tracker: NCRSoldier
      min: 18000 # 5 hours
  startingGear: NCRPrivateFirstClassGear
  icon: "JobIconNcrSoldier"
  supervisors: job-supervisors-ncr-sergeant
  alwaysUseSpawner: true
  access:
  - NCR
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Wastelander
          - NCR

- type: startingGear
  id: NCRPrivateFirstClassGear
  equipment:
    head: N14ClothingHeadHatNCRHelmetMetalDesert # Corvax-Change
    back: N14ClothingBackpackNCR # Corvax-Change
    jumpsuit: N14ClothingUniformNCRDesert # Corvax-Change
    outerClothing: N14ClothingOuterNCRVestDesert # Forge-Change
    shoes: N14ClothingBootsLeatherFilled
    ears: N14ClothingHeadsetNCR # #Misfits Add - NCR radio earpiece
    neck: ClothingNeckPinNCRPrivate1st
    belt: ClothingBeltNCR
    id: N14IDNCRDogtagPrivateFirstClass
    pocket1: NCRpfcloadoutkits
  innerClothingSkirt: N14ClothingUniformNCRDesert # Corvax-Change
  satchel: N14ClothingBackpackSatchelNCRFilled
  storage: # Corvax-Change
    back:
    - N14BoxPlasticFilledMilitaryNCR

- type: playTimeTracker
  id: NCRPrivateFirstClass
