# C-27 Humanoid Robot — department + job + playtime tracker. #Misfits Add (Phase G)
# Mirrors the Synthetics/SuperMutant whitelist-only species-job pattern: one department
# ("C-27 Autonomous Unit") containing one job (C27), locked behind admin job whitelist
# and CharacterSpeciesRequirement so only whitelisted players who selected the C27
# species in the character editor can take the role. Registers PlayerRobot faction so
# C-27 units share alliance rules with existing player robots / SentryBots / HostileRobots.
# Cosmetic faction skin (NCR / BoS / Generic) is selected via the Phase C marking, not
# via separate jobs.

- type: department
  id: C27Unit
  description: department-C27Unit-description
  color: "#8a96a3" # light brushed-steel grey, distinct from Robots (#607d8b)
  weight: -100 # group with Robots / FEVMutants / Enclave special departments
  roles:
  - C27

- type: job
  id: C27
  name: job-name-c27
  description: job-description-c27
  playTimeTracker: C27
  icon: JobIconBorg
  supervisors: job-supervisors-c27
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # admin job whitelist required (jobwhitelistadd <player> C27)
  hideWithoutWhitelist: true
  jobWhitelistBypassesRoleTimers: true
  spawnLoadout: false # #Misfits Tweak (Phase H revised) - lobby loadout tab is hidden for C27 (restrictedCustomization);
  # armor is delivered via UndecidedLoadoutBackpack kit items in startingGear (see subGear entries below)
  applyTraits: true # allow trait/perk picks like SuperMutant
  startingGear: C27Gear
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27     # Generic model
    - C27NCR  # #Misfits Add - NCR model variant shares this job
    - C27BoS  # #Misfits Add - Brotherhood model variant shares this job
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - PlayerRobot

# Starting gear: chassis jumpsuit always applied; faction armor kit selected via subGear.
# subGear entries are matched by the player's chosen C-27 species variant at spawn time:
#   C27 (Generic)  → pocket1: C27GenericLoadoutKit
#   C27NCR         → pocket1: C27NCRLoadoutKit
#   C27BoS         → pocket1: C27BoSLoadoutKit
# The kit opens an UndecidedLoadoutBackpack UI so the player picks Light / Medium / Heavy plating.
- type: startingGear
  id: C27Gear
  equipment:
    jumpsuit: ClothingC27Chassis
  subGear: # #Misfits Add - per-faction kit delivery via species-conditional sub-gears
  - C27GearGenericKit
  - C27GearNCRKit
  - C27GearBoSKit

# Sub-gear: gives the Generic-model kit in pocket1 when species is C27
- type: startingGear
  id: C27GearGenericKit
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27
  equipment:
    pocket1: C27GenericLoadoutKit

# Sub-gear: gives the NCR-model kit in pocket1 when species is C27NCR
- type: startingGear
  id: C27GearNCRKit
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27NCR
  equipment:
    pocket1: C27NCRLoadoutKit

# Sub-gear: gives the BoS-model kit in pocket1 when species is C27BoS
- type: startingGear
  id: C27GearBoSKit
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27BoS
  equipment:
    pocket1: C27BoSLoadoutKit

- type: playTimeTracker
  id: C27
