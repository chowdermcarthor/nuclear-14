# Robot species definitions for player-controlled synthetic robots. #Misfits Change
# Four variants: Mr. Handy, Protectron, Mr. Gutsy, Assaultron.
# roundStart: true so whitelisted players see them in the character editor species dropdown
# and via the Robot Type variant picker panel.
# Access is gated via the RobotSpawn job whitelist (jobwhitelistadd RobotSpawn).

- type: species
  id: RobotMrHandy
  name: species-name-robot-mr-handy
  roundStart: true
  order: 10 # #Misfits Change: robots last
  whitelistRequired: true # #Misfits Change
  restrictedCustomization: true # #Misfits Change
  jobWhitelistUnlock: RobotSpawn # #Misfits Change
  restrictedJobs: # #Misfits Change
  - RobotSpawn
  sprites: RobotSprites
  markingLimits: RobotMarkingLimits
  prototype: N14PlayerSyntheticMrHandy
  dollPrototype: N14PlayerSyntheticMrHandy
  skinColoration: Hues

