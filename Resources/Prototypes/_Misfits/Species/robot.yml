# Shared marking limits — robots have no body markings but need a valid points block.
- type: markingPoints
  id: RobotMarkingLimits
  onlyWhitelisted: true
  points:
    Chest:
      points: 0
      required: false

# Shared sprite set — not actually rendered (robot entities use their own Sprite component).
# Minimal valid entry using layers that don’t sex-morph.
- type: speciesBaseSprites
  id: RobotSprites
  sprites:
    Eyes: MobHumanoidEyes
