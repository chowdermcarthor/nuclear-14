# Super Mutant body parts.
# Update sprite paths once .dmi sprites are converted to .rsi.

- type: entity
  id: MisfitsPartSuperMutant
  parent: [BaseItem, BasePart]
  name: "super mutant body part"
  abstract: true
  components:
  - type: Damageable
    damageContainer: Biological
  - type: BodyPart
  - type: ContainerContainer
    containers:
      bodypart: !type:Container
        ents: []
  - type: StaticPrice
    price: 0
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 5
      - ReagentId: Blood
        Quantity: 15

- type: entity
  id: MisfitsTorsoSuperMutant
  name: "super mutant torso"
  parent: [MisfitsPartSuperMutant, BaseTorso]
  components:
  - type: Sprite
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 15
      - ReagentId: Blood
        Quantity: 30
  - type: StaticPrice
    price: 15
  - type: Item
    size: Large

- type: entity
  id: MisfitsHeadSuperMutant
  name: "super mutant head"
  parent: [MisfitsPartSuperMutant, BaseHead]
  components:
  - type: Sprite
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    state: "head_m"
  - type: Icon
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    state: "head_m"
  - type: BodyPart
    partType: Head
    vital: true
  - type: Input
    context: "ghost"
  - type: MovementSpeedModifier
    baseWalkSpeed: 0
    baseSprintSpeed: 0
  - type: InputMover
  - type: GhostOnMove
  - type: Tag
    tags:
      - Head
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 8
      - ReagentId: Blood
        Quantity: 15
  - type: StaticPrice
    price: 15
  - type: Item
    size: Normal

