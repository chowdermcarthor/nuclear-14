# ── Active expedition categories ──
# Maps can optionally define factionSpawns: the majority faction in the gather
# radius determines where ALL players teleport (minority follows majority).
#
# Temporarily disabled due to RAM/engine constraints (server OOM at 8 GB):
#   - Sunnyvale Surface  (SunnyvaleSurface.yml)
#   - Mercer Island Surface  (MercerIslandSurface.yml)
#   - Mercer Island Underground  (MercerIslandSewers.yml)
# Only the Abandoned Vault (SunnyvaleUnderground) is loaded until limits are raised.

