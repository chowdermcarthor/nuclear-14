- type: n14ExpeditionDifficulty
  id: N14ExpeditionAbandonedVault
  name: n14-expedition-difficulty-abandoned-vault
  color: "#6B4F3A"  # dark earthy brown
  duration: 900  # 15 minutes — underground map
  sortOrder: 0
  maps:
    - path: /Maps/N14/SunnyvaleUnderground.yml
      factionSpawns:
        - factions: [NCR, Rangers]
          position: -147.11, 3.06
        - factions: [CaesarLegion]
          position: -138.70, -80.35
        - factions: [BrotherhoodOfSteel]
          position: -134.47, -81.24
        - factions: [Townsfolk]
          position: 99.70, 241.69
        - factions: [Wastelander]
          position: -22.25, -44.57
        - factions: [PlayerRaider, Raider]
          position: -22.25, -44.57
        - factions: [Tribal]
          position: -22.25, -44.57
        - factions: [PlayerSuperMutant, SuperMutant]
          position: -22.25, -44.57
        - factions: [PlayerRobot, PlayerSentryBot]
          position: -22.25, -44.57
