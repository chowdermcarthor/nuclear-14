# #Misfits Change - Robot player navigation and comms module (sits in the IDCARD inventory slot)
# Grants a hotbar action to open the Wendover map UI when equipped.
# Loaded into each synthetic robot via ContainerFill so it is present at spawn.
# Not shown in the strip menu (borgRobot template uses stripHidden: true on the id slot).

- type: entity
  parent: N14IDCard
  id: MisfitsRobotNavCard
  name: navigation module
  description: An integrated navigation and communications chip embedded in synthetic beings. Provides tactical map access and facilitates radio-frequency communications. Cannot be removed without specialized tools.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Misc/tapes_cards.rsi
    scale: 0.7, 0.7
    layers:
    - state: keycard_vault
  - type: WastelandMap
    mapTexturePath: _Misfits/Maps/WendoverCF.png
    mapTitle: General Atomics Navigation
    worldBounds: "-463,-344,462,298"
    # No tacticalFeed - standalone personal map, no faction blip sharing
  - type: WastelandMapAction
    requiredSlot: IDCARD
  - type: UserInterface
    interfaces:
      enum.WastelandMapUiKey.Key:
        type: WastelandMapBoundUserInterface

# #Misfits Change - RobCo Industries nav card for Protectron and Assaultron
- type: entity
  parent: MisfitsRobotNavCard
  id: MisfitsRobotNavCardRobCo
  name: navigation module
  description: An integrated navigation and communications chip embedded in synthetic beings. Provides tactical map access and facilitates radio-frequency communications. Cannot be removed without specialized tools.
  categories: [ HideSpawnMenu ]
  components:
  - type: WastelandMap
    mapTexturePath: _Misfits/Maps/WendoverCF.png
    mapTitle: RobCo Industries Navigation
    worldBounds: "-463,-344,462,298"
