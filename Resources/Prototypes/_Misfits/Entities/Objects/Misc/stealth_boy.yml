# #Misfits Add - Stealth Boy item. Uses Pip-Boy sprite from _Nuclear14, tinted blue.
# Activates via UseInHand or its hotkey action. Fades the user's sprite to near-invisible for 30 seconds.
# One-time use — deleted on activation.
# #Misfits Change - Parented to N14BasePipboy so it also functions as a full Pip-Boy
# with all preinstalled cartridges (Hub, Groups, Directory, Settings, Map, etc.).

- type: entity
  id: MisfitsStealthBoy
  name: Stealth Boy
  description: A pre-war personal stealth device developed by RobCo Industries. Generates a
    light-bending field around the wearer, rendering them nearly invisible for a short time.
    One-time use only.
  parent: N14BasePipboy
  components:
  - type: Sprite
    color: "#4488FF"  # Blue tint to distinguish from a standard Pip-Boy
  - type: PdaBorderColor
    borderColor: "#4488FF"
  - type: Item
    size: Small
    sprite: _Nuclear14/Objects/Misc/pipboy.rsi
    heldPrefix: pda
  - type: StealthBoy
    duration: 30
    fadeInTime: 1.5
    fadeOutTime: 2
    minOpacity: 0.15
  - type: ActionGrant
    actions:
    - ActionActivateStealthBoy
  - type: ItemActionGrant
    actions:
    - ActionActivateStealthBoy
  - type: StaticPrice
    price: 800
