#MARK: Misc

# Assaultron head laser — devastating focused heat beam.
# Orange tint, wide beam, holds for ~3 seconds to simulate a sustained focused blast.
- type: hitscan
  id: N14AssaultronHeadLaser
  damage:
    types:
      Heat: 90
      Structural: 15
  tintColor: "#FF6A00"
  beamWidth: 3
  beamDuration: 3.0
  muzzleFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: muzzle_laser
  travelFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: beam
  impactFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: impact_laser
