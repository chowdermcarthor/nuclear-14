# Misfits — Tiered hitscan definitions for microfusion cell and electron charge pack ammunition.
# Each energy weapon class has 4 colour-coded tiers: Red (lowest) < Green < Blue < Violet (highest).
# The ammo cell determines beam colour and damage; the gun determines fire rate and accuracy.

#MARK: Microfusion Cell Lasers — Red < Green < Blue < Violet
# Used by N14MicrofusionCellRed/Green/Blue/Violet. All laser weapons accept any of these.

- type: hitscan
  id: N14MFLaserRed
  damage:
    types:
      Heat: 17
  muzzleFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: muzzle_laser
  travelFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: beam
  impactFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: impact_laser

- type: hitscan
  id: N14MFLaserGreen
  damage:
    types:
      Heat: 21
  muzzleFlash:
    sprite: _Misfits/Objects/Weapons/Guns/Projectiles/green_laser.rsi
    state: muzzle_green_laser
  travelFlash:
    sprite: _Misfits/Objects/Weapons/Guns/Projectiles/green_laser.rsi
    state: beam_green
  impactFlash:
    sprite: _Misfits/Objects/Weapons/Guns/Projectiles/green_laser.rsi
    state: impact_green_laser

- type: hitscan
  id: N14MFLaserBlue
  damage:
