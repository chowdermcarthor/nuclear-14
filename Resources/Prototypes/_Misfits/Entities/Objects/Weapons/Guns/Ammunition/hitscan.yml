# Assaultron head laser — devastating focused heat beam.
# High single-shot damage, slow fire rate, long recharge between shots.
- type: hitscan
  id: N14AssaultronHeadLaser
  damage:
    types:
      Heat: 40
  muzzleFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: muzzle_red
  travelFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: beam_red
  impactFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: impact_red
