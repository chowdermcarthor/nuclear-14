# Dedicated battery cells for pulse, green laser, and tesla weapons.
# These override the ammo provider so each weapon fires the correct visual effect.
# Pulse cells fire blue electromagnetic pulse shots rather than red laser beams.
# Green laser cell fires a green beam (RCW â€” in Fallout the RCW fires green, not red).
# Tesla cells fire energy ball projectiles with chain lightning arcs.
#
# Tag inheritance: these cells carry the same tags as their parent cells so they
# fit into existing gun whitelists (N14PowerCellSmall, N14PowerCellHigh, N14PowerCellAdvanced).

# Pulse Energy Cell â€” small, for Pulse Pistol.
# Inherits N14PowerCellSmall tag so it loads into the Pulse Pistol slot.
- type: entity
  name: pulse energy cell
  description: A compact energy cell tuned to emit focused electromagnetic pulse bursts rather than a standard laser beam. Designed for the Pulse Pistol.
  id: N14PulseEnergyCell
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/EC.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
        scale: 0.5, 0.5
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
        scale: 0.5, 0.5
  - type: Tag
    tags:
      - N14PowerCellSmall   # fits Pulse Pistol whitelist
      - N14AmmoCell
  - type: Battery
    maxCharge: 600
    startingCharge: 600
  - type: HitscanBatteryAmmoProvider
    proto: N14PulseShotLight
    fireCost: 50

# Pulse Microfusion Cell â€” high, for Pulse Carbine and Pulse Rifle (YK42B).
# Inherits N14PowerCellHigh tag so it loads into either gun's slot.
- type: entity
  name: pulse microfusion cell
  description: A microfusion cell reconfigured to fire focused pulse blasts. Feeds the Pulse Carbine and Pulse Rifle with distinctive blue electromagnetic discharge.
  id: N14PulseMicrofusionCell
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/microfusion.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
  - type: Tag
    tags:
      - N14PowerCellHigh    # fits Pulse Carbine and Pulse Rifle whitelists
      - N14AmmoCell
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: HitscanBatteryAmmoProvider
    proto: N14PulseShotMedium
    fireCost: 50

# Tesla Electron Charge Pack â€” for the Tesla Cannon.
# Inherits N14PowerCellAdvanced tag. Uses a projectile provider so the cannon
# fires a physical energy ball (TeslaGunBullet) with chain lightning arcs.
- type: entity
  name: tesla electron charge pack
  description: An electron charge pack modified to discharge a sustained ball of electricity rather than a focused beam. The Tesla Cannon's signature munition â€” unstable, dangerous, and spectacular.
  id: N14TeslaElectronChargePack
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/ECP.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
        scale: 0.5, 0.5
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        scale: 0.5, 0.5
        shader: unshaded
  - type: Tag
    tags:
      - N14PowerCellAdvanced   # fits Tesla Cannon whitelist
      - N14AmmoCell
  - type: Battery
    maxCharge: 2375
    startingCharge: 2375
  - type: ProjectileBatteryAmmoProvider
    proto: TeslaGunBullet     # existing SS14 proto: energy_miniball.rsi tesla_projectile + chain lightning
    fireCost: 250

# Green Microfusion Cell — for the Laser RCW.
# The RCW in Fallout fires a distinctive green laser, not the standard red.
# Same capacity as N14PowerCellHigh, carries the same tag so it loads into the RCW slot.
- type: entity
  name: green microfusion cell
  description: A microfusion cell tuned to emit a green-wavelength laser beam — the distinctive colour of the Rapid-Cycling Weapon. Functionally identical to a standard microfusion cell, just differently calibrated.
  id: N14GreenMicrofusionCell
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/microfusion.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
  - type: Tag
    tags:
      - N14PowerCellHigh   # fits RCW whitelist
      - N14AmmoCell
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: HitscanBatteryAmmoProvider
    proto: N14GreenMediumLaser
    fireCost: 50

# Blue Electron Charge Pack — for the AER-14 prototype laser rifle.
# The AER-14 is a unique pre-war prototype; blue discharge distinguishes it
# from standard red-laser ECP weapons and reflects its experimental nature.
- type: entity
  name: blue electron charge pack
  description: An experimental electron charge pack emitting a blue-spectrum beam — the signature discharge of the AER-14 prototype. Pre-war laboratory origin, considerably rarer than standard ECPs.
  id: N14BlueElectronChargePack
  suffix: Full
  parent: N14BasePowerCell
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Battery/ECP.rsi
    layers:
      - map: [ "enum.PowerCellVisualLayers.Base" ]
        state: empty
        scale: 0.5, 0.5
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        scale: 0.5, 0.5
        shader: unshaded
  - type: Tag
    tags:
      - N14PowerCellAdvanced   # fits AER-14 whitelist
      - N14AmmoCell
  - type: Battery
    maxCharge: 2375
    startingCharge: 2375
  - type: HitscanBatteryAmmoProvider
    proto: N14BlueMediumLaser
    fireCost: 50
