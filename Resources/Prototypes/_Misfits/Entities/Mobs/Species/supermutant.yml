# Super Mutant base mob entity.
# Full humanoid species with hands, inventory, and clothing support.
# Higher health thresholds and slower movement to reflect their bulk.

- type: entity
  save: false
  name: super mutant
  id: N14BaseMobSuperMutant
  parent: BaseMobSpeciesOrganic
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: SuperMutant
  - type: Inventory #Misfits Change - displacement maps to stretch clothing onto larger body
    speciesId: supermutant
    displacements:
      jumpsuit:
        clothingScale: 1.3, 1.5
        layer:
          sprite: _Misfits/Mobs/Species/SuperMutant/displacement.rsi
          state: jumpsuit
          copyToShaderParameters:
            layerKey: dummy
            parameterTexture: displacementMap
            parameterUV: displacementUV
      outerClothing:
        clothingScale: 1.3, 1.5
        layer:
          sprite: _Misfits/Mobs/Species/SuperMutant/displacement.rsi
          state: outerClothing
          copyToShaderParameters:
            layerKey: dummy
            parameterTexture: displacementMap
            parameterUV: displacementUV
      gloves:
        clothingScale: 1.3, 1.5
        layer:
          sprite: _Misfits/Mobs/Species/SuperMutant/displacement.rsi
          state: gloves
          copyToShaderParameters:
            layerKey: dummy
            parameterTexture: displacementMap
            parameterUV: displacementUV
      shoes:
        clothingScale: 1.3, 1.5
        layer:
          sprite: _Misfits/Mobs/Species/SuperMutant/displacement.rsi
          state: shoes
          copyToShaderParameters:
            layerKey: dummy
            parameterTexture: displacementMap
            parameterUV: displacementUV
      head:
        clothingScale: 1.3, 1.5
        layer:
          sprite: _Misfits/Mobs/Species/SuperMutant/displacement.rsi
          state: head
          copyToShaderParameters:
            layerKey: dummy
            parameterTexture: displacementMap
            parameterUV: displacementUV
      mask:
        clothingScale: 1.3, 1.5
        layer:
          sprite: _Misfits/Mobs/Species/SuperMutant/displacement.rsi
          state: mask
          copyToShaderParameters:
            layerKey: dummy
            parameterTexture: displacementMap
            parameterUV: displacementUV
      neck:
        clothingScale: 1.3, 1.5
        layer:
          sprite: _Misfits/Mobs/Species/SuperMutant/displacement.rsi
          state: neck
          copyToShaderParameters:
            layerKey: dummy
            parameterTexture: displacementMap
            parameterUV: displacementUV
  - type: Body
    prototype: SuperMutant
    requiredLegs: 2
  - type: Icon
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    state: full
  - type: Sprite
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    netsync: false
    noRot: true
    drawdepth: Mobs
    layers:
      - map: [ "enum.HumanoidVisualLayers.Chest" ]
      - map: [ "enum.HumanoidVisualLayers.Head" ]
      - map: [ "enum.HumanoidVisualLayers.Snout" ]
      - map: [ "enum.HumanoidVisualLayers.Eyes" ]
      - map: [ "enum.HumanoidVisualLayers.RArm" ]
      - map: [ "enum.HumanoidVisualLayers.LArm" ]
      - map: [ "enum.HumanoidVisualLayers.RLeg" ]
      - map: [ "enum.HumanoidVisualLayers.LLeg" ]
      - shader: StencilClear
        sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
        state: l_leg
      - shader: StencilMask
        map: [ "enum.HumanoidVisualLayers.StencilMask" ]
        sprite: Mobs/Customization/masking_helpers.rsi
        state: female_full
        visible: false
      - map: [ "jumpsuit" ]
      - map: [ "enum.HumanoidVisualLayers.LHand" ]
      - map: [ "enum.HumanoidVisualLayers.RHand" ]
      - map: [ "enum.HumanoidVisualLayers.LFoot" ]
      - map: [ "enum.HumanoidVisualLayers.RFoot" ]
      - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
        color: "#ffffff"
        sprite: Objects/Misc/handcuffs.rsi
        state: body-overlay-2
        visible: false
      - map: [ "id" ]
      - map: [ "gloves" ]
      - map: [ "shoes" ]
      - map: [ "ears" ]
      - map: [ "outerClothing" ]
      - map: [ "eyes" ]
      - map: [ "belt" ]
      - map: [ "neck" ]
      - map: [ "back" ]
      - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
      - map: [ "enum.HumanoidVisualLayers.Hair" ]
      - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
      - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
      - map: [ "enum.HumanoidVisualLayers.Tail" ]
      - map: [ "mask" ]
      - map: [ "head" ]
      - map: [ "pocket1" ]
      - map: [ "pocket2" ]
  - type: Perishable
    rotAfter: 3600
  - type: Hunger
    starvationDamage:
      types:
        Cold: 0.15
    starvingSlowdownModifier: 0.5
  - type: Thirst
  - type: Damageable
    damageContainer: Biological
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.0
    baseSprintSpeed: 3.5
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical
      200: Dead

- type: entity
  save: false
  parent: MobHumanDummy
  id: N14MobSuperMutantDummy
  categories: [ HideSpawnMenu ]
  components:
  - type: HumanoidAppearance
    species: SuperMutant
