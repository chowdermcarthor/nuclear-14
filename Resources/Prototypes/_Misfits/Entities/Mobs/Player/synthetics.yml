# Player-controlled Synthetic robots for the Misfits server.
# These inherit directly from N14BaseRobotChassis so they do NOT have the
# GhostRole component that pre-placed map robots carry.

- type: entity
  parent: N14BaseRobotChassis
  id: N14BasePlayerSynthetic
  abstract: true
  components:
  - type: RobotWeaponPickupBlacklist # #Misfits Add: player robot species keep hands for utility items but cannot grab loose weapons.
    blacklist:
      components:
      - Gun
  - type: Appearance # #Misfits Change: allow robot sprites to swap to their built-in dead state
  - type: DamageStateVisuals # #Misfits Change: use robot dead sprites instead of animated hover frames when downed/dead
    states:
      Alive:
        Base: icon
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: RobotDownedVisuals # #Misfits Change: force the dead frame while the robot is lying down
  - type: Stripping # #Misfits Change: allow player robots to open strip UI with hover + E
  - type: RobotCriticalSparking # #Misfits Change: spark and crackle while near destruction, stop once repaired
  - type: Reflect # #Misfits Change: player robots can ricochet projectiles off their chassis
    innate: true
    reflectProb: 0.1
    spread: 150
    reflects:
    - NonEnergy
    - Energy
    - SmallCaliber
    - MediumCaliber

- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticMrHandy
  name: mr. handy
  suffix: player, synthetic
  description: A General Atomics Mr. Handy domestic servant robot, now guided by a living mind.
  components:
  - type: HumanoidAppearance
    species: RobotMrHandy
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/mrhandyclaw.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: icon
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: icon
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: BorgHands # #Misfits Change: Mr. Handy gets a third usable item slot
    handCount: 3
  # #Misfits Change: Disabled idle/aggro auto-sounds for player-controlled robots — sounds fire uncontrollably while the player is present
  # - type: IdleSound
  # - type: SpamEmitSound
  #   minInterval: 15
  #   maxInterval: 50
  #   sound:
  #     collection: N14HandyIdle
  #     params:
  #       volume: -7
  #       maxDistance: 6
  - type: StepTriggerImmune
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Change: gradual self-repair, ~30 per type per minute
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
  - type: RobotSelfRepairAnnouncer # #Misfits Change: hull integrity warnings + self-repair popups

  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleDiagnosis
        - BorgModuleTreatment
        - BorgModuleSurgery
        - N14BorgModuleFlamer # #Misfits Add: Mr. Handy gets an integrated flamer for domestic and combat use
        - BorgModuleCleaning # #Misfits Add: Mr. Handy is a domestic servant — cleaning module is thematic
      id: # #Misfits Change: pre-load the nav module into the id inventory slot
        - MisfitsRobotNavCard
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticProtectron
  name: protectron
  suffix: player, synthetic
  description: A RobCo Industries Protectron security robot, now guided by a living mind.
  components:
  - type: HumanoidAppearance
    species: RobotProtectron
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/protectron.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: icon
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: icon
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  # #Misfits Change: Disabled idle/aggro auto-sounds for player-controlled robots — sounds fire uncontrollably while the player is present
  # - type: IdleSound
  # - type: SpamEmitSound
  #   minInterval: 15
  #   maxInterval: 50
  #   sound:
  #     collection: N14ProtectronIdle
  #     params:
  #       volume: -7
  #       maxDistance: 6
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.0
    baseSprintSpeed: 3.5
  - type: Armor # #Misfits Change: innate Protectron plating matches BoS Combat Armor MK2 protection values
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.65
        Heat: 0.65
  - type: ExplosionResistance # #Misfits Change: keep Protectron chassis in line with BoS Combat Armor MK2 explosive protection
    damageCoefficient: 0.75
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Change: gradual self-repair, ~30 per type per minute
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
  - type: RobotSelfRepairAnnouncer # #Misfits Change: hull integrity warnings + self-repair popups

  - type: Tag # #Misfits Change: Protectron walks, so it should have footstep sounds
    tags:
    - DoorBumpOpener
    - CanPilot
    - FootstepSound
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      id: # #Misfits Change: pre-load the nav module into the id inventory slot
        - MisfitsRobotNavCardRobCo # RobCo Industries Navigation
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

