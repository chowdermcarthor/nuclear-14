  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: N14AssaultronAttack
    angle: 0
    animation: WeaponArcPunch
    range: 1.5
    damage:
      types:
        Slash: 30 # #Misfits Tweak: player assaultrons should match the NPC claw damage profile
  - type: Gun # #Misfits Add: Assaultron head laser — devastating focused heat beam, slow fire rate
    minAngle: 1
    maxAngle: 6
    angleIncrease: 2
    angleDecay: 4
    fireRate: 0.5
    useKey: false
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
  - type: HitscanBatteryAmmoProvider # #Misfits Add: battery-fed hitscan, 3 shots then long recharge
    proto: N14AssaultronHeadLaser
    fireCost: 3000
  - type: Battery
    maxCharge: 9000
    startingCharge: 9000
  - type: BatterySelfRecharger # #Misfits Add: ~6 seconds per shot recharge
